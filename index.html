<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kit Creator BR</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0F1C;--panel:#111827;--panel2:#1a2235;--panel3:#212d42;--primary:#1F5FBF;--accent:#FFD400;--text:#FFFFFF;--text2:#9CA3AF;--text3:#4B5563;--border:#1e2d45;--border2:#2a3d5a;--green:#10b981;--red:#ef4444;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{height:60px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;z-index:10;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;display:flex;align-items:center;gap:8px;}
.logo span{color:var(--accent);}
.logo-badge{background:var(--primary);font-size:9px;font-family:'Barlow Condensed',sans-serif;letter-spacing:2px;padding:2px 6px;border-radius:3px;font-weight:700;}
.header-actions{display:flex;gap:6px;}
.btn{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:7px 14px;border-radius:4px;border:none;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--text);background:var(--panel2);}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:#2a6fd4;}
.btn-accent{background:var(--accent);color:#0A0F1C;}
.btn-accent:hover{background:#ffe033;}
.btn-green{background:var(--green);color:#fff;}
.main{display:flex;flex:1;overflow:hidden;}
.sidebar{width:310px;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column;}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.stab{flex:1;padding:10px 4px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.stab:hover{color:var(--text2);}
.stab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.section{border-bottom:1px solid var(--border);}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2);user-select:none;transition:color .15s;}
.sec-hdr:hover{color:var(--text);}
.sec-hdr.active{color:var(--accent);}
.sec-hdr .arr{transition:transform .2s;font-size:9px;}
.sec-hdr.active .arr{transform:rotate(180deg);}
.sec-body{display:none;padding:0 16px 14px;}
.sec-body.open{display:block;}
.style-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.style-card{border:2px solid var(--border);border-radius:6px;padding:8px 6px;cursor:pointer;text-align:center;transition:all .15s;background:var(--panel2);}
.style-card:hover{border-color:var(--primary);}
.style-card.selected{border-color:var(--accent);background:#1c1e0a;}
.style-mini{width:36px;height:44px;margin:0 auto 5px;}
.style-name{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text2);}
.style-card.selected .style-name{color:var(--accent);}
.color-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.color-label{font-size:12px;color:var(--text2);}
.color-wrap{display:flex;align-items:center;gap:6px;}
.swatch{width:26px;height:26px;border-radius:4px;border:1px solid var(--border2);cursor:pointer;overflow:hidden;position:relative;flex-shrink:0;}
.swatch input[type=color]{position:absolute;width:200%;height:200%;top:-50%;left:-50%;border:none;cursor:pointer;opacity:0;}
.hex-val{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--text2);letter-spacing:1px;width:56px;}
.smart-row{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;}
.smart-btn{flex:1;min-width:58px;background:var(--panel2);border:1px solid var(--border);border-radius:4px;padding:5px 3px;cursor:pointer;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text2);transition:all .15s;}
.smart-btn:hover{border-color:var(--accent);color:var(--accent);}
.pattern-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:10px;}
.pat-btn{background:var(--panel2);border:2px solid var(--border);border-radius:4px;padding:7px 3px;cursor:pointer;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text2);transition:all .15s;}
.pat-btn:hover{border-color:var(--primary);}
.pat-btn.selected{border-color:var(--accent);color:var(--accent);}
.pat-icon{font-size:14px;display:block;margin-bottom:3px;}
.slider-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;}
.slider-label{font-size:11px;color:var(--text2);white-space:nowrap;width:68px;}
.slider-val{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--text2);width:28px;text-align:right;}
input[type=range]{flex:1;accent-color:var(--primary);height:3px;}
.stripe-list{display:flex;flex-direction:column;gap:6px;}
.stripe-item{background:var(--panel2);border:1px solid var(--border);border-radius:5px;padding:8px 10px;display:flex;align-items:center;justify-content:space-between;}
.stripe-region{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text2);}
.stripe-controls{display:flex;align-items:center;gap:8px;}
.toggle-group{display:flex;gap:5px;margin-bottom:10px;}
.tog-btn{flex:1;background:var(--panel2);border:2px solid var(--border);border-radius:4px;padding:7px;cursor:pointer;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text2);transition:all .15s;}
.tog-btn:hover{border-color:var(--primary);}
.tog-btn.selected{border-color:var(--accent);color:var(--accent);}
.parts-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.part-item{display:flex;align-items:center;justify-content:space-between;background:var(--panel2);border:1px solid var(--border);border-radius:4px;padding:6px 8px;}
.part-lbl{font-size:11px;color:var(--text2);}
.vis-tog{width:30px;height:16px;background:var(--border);border-radius:8px;position:relative;cursor:pointer;transition:background .2s;border:none;flex-shrink:0;}
.vis-tog.on{background:var(--primary);}
.vis-tog::after{content:'';position:absolute;width:10px;height:10px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .2s;}
.vis-tog.on::after{left:17px;}
.inp-group{margin-bottom:10px;}
.inp-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);margin-bottom:5px;display:block;}
.inp-field{width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:4px;padding:7px 10px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;outline:none;transition:border-color .15s;}
.inp-field:focus{border-color:var(--primary);}
.font-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
.font-btn{background:var(--panel2);border:2px solid var(--border);border-radius:4px;padding:6px 3px;cursor:pointer;text-align:center;transition:all .15s;color:var(--text2);}
.font-btn:hover{border-color:var(--primary);}
.font-btn.selected{border-color:var(--accent);color:var(--accent);}
.font-preview{font-size:18px;display:block;}
.font-name{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.logo-drop{border:2px dashed var(--border);border-radius:6px;padding:12px;text-align:center;cursor:pointer;transition:all .2s;background:var(--panel2);position:relative;margin-bottom:10px;}
.logo-drop:hover{border-color:var(--primary);}
.logo-drop.has{border-color:var(--accent);border-style:solid;}
.logo-drop input[type=file]{display:none;}
.logo-ico{font-size:20px;margin-bottom:4px;}
.logo-txt{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text2);}
.logo-thumb{width:48px;height:48px;object-fit:contain;margin:0 auto 4px;display:block;}
.logo-rm{margin-top:5px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--red);background:none;border:1px solid #ef444430;border-radius:3px;padding:3px 8px;cursor:pointer;}
.kits-list{display:flex;flex-direction:column;gap:6px;}
.kit-item{display:flex;align-items:center;justify-content:space-between;background:var(--panel2);border:1px solid var(--border);border-radius:5px;padding:7px 10px;cursor:pointer;transition:border-color .15s;}
.kit-item:hover{border-color:var(--primary);}
.kit-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.kit-meta{font-size:10px;color:var(--text2);}
.kit-acts{display:flex;gap:4px;}
.kit-ico-btn{background:none;border:none;cursor:pointer;font-size:13px;opacity:.5;transition:opacity .15s;padding:2px;}
.kit-ico-btn:hover{opacity:1;}
.kits-empty{font-size:11px;color:var(--text2);text-align:center;padding:10px;font-style:italic;}
.save-row{display:flex;gap:6px;margin-bottom:10px;}
.save-inp{flex:1;background:var(--panel2);border:1px solid var(--border);border-radius:4px;padding:7px 10px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;outline:none;}
.save-inp:focus{border-color:var(--primary);}
.save-inp::placeholder{color:var(--text3);}
/* PREVIEW */
.preview-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 35%,#0f1e3a 0%,#0A0F1C 65%);position:relative;overflow:hidden;}
.preview-area::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,0.015) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,0.015) 40px);}
.view-tabs{display:flex;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:3px;z-index:1;margin-bottom:16px;}
.view-tab{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:5px 18px;border-radius:4px;border:none;cursor:pointer;background:transparent;color:var(--text2);transition:all .15s;}
.view-tab.active{background:var(--primary);color:#fff;}
.jersey-wrap{position:relative;z-index:1;filter:drop-shadow(0 24px 60px rgba(0,0,0,.7));animation:fadeUp .4s ease-out;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.jersey-svg{width:260px;height:auto;transition:all .25s;}
footer{height:52px;background:var(--panel);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:8px;flex-shrink:0;}
/* MOCKUP MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--panel);border:1px solid var(--border2);border-radius:10px;padding:24px;width:640px;max-width:95vw;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:18px;}
/* MOCKUP TABS */
.mockup-tabs{display:flex;gap:6px;margin-bottom:16px;}
.mtab{flex:1;background:var(--panel2);border:2px solid var(--border);border-radius:5px;padding:8px;cursor:pointer;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text2);transition:all .15s;}
.mtab:hover{border-color:var(--primary);}
.mtab.active{border-color:var(--accent);color:var(--accent);}
.mockup-preview{background:#1a1a2a;border-radius:8px;display:flex;align-items:center;justify-content:center;min-height:320px;margin-bottom:16px;position:relative;overflow:hidden;}
.mockup-canvas{max-width:100%;max-height:400px;}
.export-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.export-card{background:var(--panel2);border:1px solid var(--border);border-radius:7px;padding:12px 6px;cursor:pointer;transition:all .2s;text-align:center;}
.export-card:hover{border-color:var(--primary);background:var(--panel3);}
.export-icon{font-size:22px;margin-bottom:4px;}
.export-name{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.export-desc{font-size:9px;color:var(--text2);margin-top:2px;}
.modal-close{width:100%;background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:4px;padding:8px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;transition:all .15s;}
.modal-close:hover{color:var(--text);}
/* FRENTE CONTROLS */
.frente-toggles{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.frente-row{display:flex;align-items:center;justify-content:space-between;background:var(--panel2);border:1px solid var(--border);border-radius:4px;padding:8px 10px;}
.frente-lbl{font-size:12px;color:var(--text2);}
/* TOAST */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--accent);color:#0A0F1C;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:9px 20px;border-radius:4px;opacity:0;transition:all .25s;z-index:300;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<header>
  <div class="logo">KIT<span>CREATOR</span><div class="logo-badge">BR</div></div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="resetKit()">↺</button>
    <button class="btn btn-ghost" onclick="openMockup()">🖼 Mockup</button>
    <button class="btn btn-accent" onclick="saveKitLocal()">💾 Salvar</button>
  </div>
</header>

<div class="main">
  <aside class="sidebar">
    <div class="sidebar-tabs">
      <div class="stab active" onclick="switchTab('design',this)">Design</div>
      <div class="stab" onclick="switchTab('partes',this)">Partes</div>
      <div class="stab" onclick="switchTab('player',this)">Player</div>
      <div class="stab" onclick="switchTab('kits',this)">Kits</div>
    </div>

    <!-- DESIGN -->
    <div class="tab-panel active" id="tab-design">
      <div class="section">
        <div class="sec-hdr active" onclick="toggleSec(this)">Templates <span class="arr">▼</span></div>
        <div class="sec-body open"><div class="style-grid" id="styleGrid"></div></div>
      </div>
      <div class="section">
        <div class="sec-hdr" onclick="toggleSec(this)">Cores <span class="arr">▼</span></div>
        <div class="sec-body">
          <div class="smart-row" id="smartRow"></div>
          <div id="coresSection"></div>
        </div>
      </div>
      <div class="section">
        <div class="sec-hdr" onclick="toggleSec(this)">Padrão <span class="arr">▼</span></div>
        <div class="sec-body">
          <div class="pattern-grid" id="patternGrid"></div>
          <div id="patternControls"></div>
        </div>
      </div>
      <div class="section">
        <div class="sec-hdr" onclick="toggleSec(this)">Faixas / Listras <span class="arr">▼</span></div>
        <div class="sec-body"><div class="stripe-list" id="stripeList"></div></div>
      </div>
    </div>

    <!-- PARTES -->
    <div class="tab-panel" id="tab-partes">
      <div class="section">
        <div class="sec-hdr active" onclick="toggleSec(this)">Visibilidade <span class="arr">▼</span></div>
        <div class="sec-body open"><div class="parts-grid" id="partsList"></div></div>
      </div>
      <div class="section">
        <div class="sec-hdr" onclick="toggleSec(this)">Frente da Camisa <span class="arr">▼</span></div>
        <div class="sec-body">
          <div class="frente-toggles" id="frenteToggles"></div>
          <!-- PATROCINADOR UPLOAD -->
          <div class="inp-label" style="margin-top:4px">Patrocinador (imagem)</div>
          <div class="logo-drop" id="patDropArea" onclick="document.getElementById('patFileInp').click()">
            <input type="file" id="patFileInp" accept="image/*" onchange="handleUpload(event,'pat')">
            <div id="patDropContent"><div class="logo-ico">🏷</div><div class="logo-txt">Upload patrocinador<br><span style="font-size:9px;opacity:.5">PNG · SVG · JPG</span></div></div>
          </div>
          <div class="slider-row" id="patSizeRow" style="display:none">
            <span class="slider-label">Tamanho</span>
            <input type="range" min="30" max="100" value="60" id="patSize" oninput="S.patSize=+this.value;document.getElementById('patSizeV').textContent=this.value;updatePreview()">
            <span class="slider-val" id="patSizeV">60</span>
          </div>
        </div>
      </div>
      <div class="section">
        <div class="sec-hdr" onclick="toggleSec(this)">Gola <span class="arr">▼</span></div>
        <div class="sec-body"><div class="toggle-group" id="golaGroup"></div></div>
      </div>
      <div class="section">
        <div class="sec-hdr" onclick="toggleSec(this)">Escudo / Logo <span class="arr">▼</span></div>
        <div class="sec-body">
          <div class="logo-drop" id="logoDropArea" onclick="document.getElementById('logoFileInp').click()">
            <input type="file" id="logoFileInp" accept="image/*" onchange="handleUpload(event,'logo')">
            <div id="logoDropContent"><div class="logo-ico">⬡</div><div class="logo-txt">Upload escudo<br><span style="font-size:9px;opacity:.5">PNG · SVG · JPG</span></div></div>
          </div>
          <div class="inp-label">Posição</div>
          <div class="toggle-group" id="logoPosGroup">
            <button class="tog-btn selected" onclick="setLogoPos('esq',this)">Peito E</button>
            <button class="tog-btn" onclick="setLogoPos('dir',this)">Peito D</button>
            <button class="tog-btn" onclick="setLogoPos('centro',this)">Centro</button>
          </div>
          <div class="slider-row">
            <span class="slider-label">Tamanho</span>
            <input type="range" min="24" max="72" value="40" id="logoSize" oninput="S.logoSize=+this.value;document.getElementById('logoSizeV').textContent=this.value;updatePreview()">
            <span class="slider-val" id="logoSizeV">40</span>
          </div>
        </div>
      </div>
    </div>

    <!-- PLAYER -->
    <div class="tab-panel" id="tab-player">
      <div class="section">
        <div class="sec-hdr active" onclick="toggleSec(this)">Nome <span class="arr">▼</span></div>
        <div class="sec-body open">
          <div class="inp-group"><label class="inp-label">Nome</label><input class="inp-field" id="playerName" maxlength="20" value="PLAYER" oninput="updatePreview()"></div>
          <div cl
